services:
  # ── Staging ───────────────────────────────────────────────────────────────
  # Runs every hour so you can trigger a test run at any time without waiting.
  # Uses its own env-var group so secrets are isolated from production.
  - type: cron
    name: waiver-wire-bot-staging
    runtime: python
    schedule: "0 * * * *"   # Every hour — easy to hit "Trigger Run" for ad-hoc tests
    buildCommand: pip install -r requirements.txt
    startCommand: python waiver_wire.py
    envVarGroups:
      - waiver-wire-staging
    envVars:
      - key: ENV
        value: staging

  # ── Production ────────────────────────────────────────────────────────────
  # Runs every Thursday at 8 AM ET (13:00 UTC).
  # Uses a separate env-var group with production credentials.
  - type: cron
    name: waiver-wire-bot-production
    runtime: python
    schedule: "0 13 * * 4"  # Thursday 8am ET / 9am EDT
    buildCommand: pip install -r requirements.txt
    startCommand: python waiver_wire.py
    envVarGroups:
      - waiver-wire-production
    envVars:
      - key: ENV
        value: production
