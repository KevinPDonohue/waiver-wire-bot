services:
  # ── Staging ───────────────────────────────────────────────────────────────
  - type: cron
    name: waiver-wire-bot-staging
    runtime: python
    schedule: "0 * * * *"  # Every hour — use "Trigger Run" for ad-hoc tests
    buildCommand: pip install -r requirements.txt
    startCommand: python waiver_wire.py
    envVars:
      - key: ENV
        value: staging
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NTFY_TOPIC
        sync: false

  # ── Production ────────────────────────────────────────────────────────────
  - type: cron
    name: waiver-wire-bot-production
    runtime: python
    schedule: "0 13 * * 4"  # Thursday 8am ET / 9am EDT
    buildCommand: pip install -r requirements.txt
    startCommand: python waiver_wire.py
    envVars:
      - key: ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NTFY_TOPIC
        sync: false
